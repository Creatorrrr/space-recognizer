# spacerec 기본 설정
source: sources/sample_720p.mp4  # 파일 경로 또는 웹캠 인덱스(정수)
realtime: true        # true면 파일도 벽시계 기준으로 프레임 드롭 (웹캠 에뮬레이션)
proc_width: 1280      # 처리 해상도 (가로)

compute:
  precision: fp32     # fp32 or CUDA-only bf16 opt-in
  tf32: true          # CUDA matmul/conv TF32 fast path on RTX GPUs
  cudnn_benchmark: true

capture:
  source_kind: video  # video 또는 oak. --source oak로도 전환 가능
  oak_rgb_width: 1280
  oak_rgb_height: 720
  oak_depth_resolution: 400p
  oak_fps: 15.0       # USB2(HIGH) 연결에서도 안정적인 기본값
  oak_queue_size: 4
  oak_align_depth_to_rgb: true
  oak_lr_check: true
  oak_subpixel: true
  oak_extended_disparity: false
  oak_median_filter: 7x7
  oak_depth_min_m: 0.3
  oak_depth_max_m: 8.0
  oak_enable_imu: true
  oak_imu_rate_hz: 100
  replay_depth_mode: calibrated  # recorded OAK sessions: calibrated or resize
  replay_pair_tolerance_ms: 20.0

depth:
  model: depth-anything/DA3-SMALL  # HF model id (공식 depth-anything-3 패키지)
  process_res: 504
  oak_fill_missing: false          # true면 OAK stereo 빈 픽셀을 DA3로 metric 보정해 채움
  oak_fill_min_valid: 500

detect:
  # YOLOE-26 오픈 보캐뷸러리 (기본): COCO에 없는 실내 물체(rug, wardrobe 등)를
  # 올바른 라벨로 검출. 26s는 11s 대비 핵심 가구 신뢰도가 높고 중복 검출이
  # 적으며 MPS track 60ms로 더 빠름 (NMS-free E2E). 텍스트 인코더는
  # MobileCLIP2(mobileclip2_b.ts, 자동 다운로드).
  # 고정 클래스로 돌리려면 model을 yolo26s-seg.pt로 바꾸고 vocabulary를 비울 것.
  model: models/yoloe-26s-seg.pt
  conf: 0.35
  # 정적 지도에서 항상 제외할 클래스 (움직일 가능성 높음)
  dynamic_classes: [person, cat, dog, bird]
  # 인식할 어휘 (자유롭게 추가/삭제 가능 — 텍스트 임베딩은 시작 시 1회 계산)
  vocabulary: [
    person, cat, dog, bird,
    bed, sofa, armchair, chair, stool, bench,
    table, desk, wardrobe, cabinet, shelf, drawer, dresser,
    rug, curtain, mirror, lamp, chandelier, pillow, blanket,
    door, window, picture frame, clock, vase, potted plant,
    tv, monitor, laptop, keyboard, speaker,
    refrigerator, oven, microwave, sink, stove, coffee maker, toaster, kettle,
    book, cup, bottle, bowl, box, backpack,
  ]

vo:
  max_corners: 600
  keyframe_interval_s: 0.5
  keyframe_min_flow_px: 40.0
  min_inlier_ratio: 0.5

imu:
  enabled: true          # true면 gyro-derived LK/PnP rotation prior 사용
  use_lk_prior: true
  use_pnp_prior: true
  min_rotation_samples: 2
  max_rotation_deg: 35.0  # 이보다 큰 frame-window prior는 버리고 visual-only로 fallback
  keyframe_blur_omega_rad_s: 2.5
  keyframe_max_delay_s: 1.0

backend:
  period_s: 5.0
  window_size: 12      # 멀티뷰 윈도 키프레임 수
  overlap: 6           # 직전 윈도와 중첩 키프레임 수
  voxel_size: 0.03     # 전역 지도 voxel (장면 스케일 단위)
  max_points: 800000
  metric_anchor: true   # DA3METRIC-LARGE로 미터 단위 추정 (윈도당 +0.3~1s)
  metric_anchor_every_n_windows: 1
  metric_anchor_process_res: null

mesh:
  enabled: false
  voxel_size: 0.05      # TSDF mesh voxel size
  trunc_margin: 0.15    # 보통 voxel_size의 3배
  depth_trunc_m: 8.0
  min_surface_observations: 2
  max_active_submaps: 32
  render_mode: canonical # canonical(기본), raw(디버그), both
  canonical_cell_size: 0.10
  canonical_distance_m: 0.10
  canonical_normal_cos: 0.85
  canonical_min_support: 1
  canonical_support_weight: 1.0
  canonical_residual_weight: 0.25
  canonical_recency_weight: 0.10
  persist_evidence: false
  export_on_exit: false

objects:
  ema_alpha: 0.3
  merge_radius: 0.5    # 연관 게이트 상한 (기본은 물체 크기에 비례)
  dynamic_var_thresh: 0.3
  appearance: true     # DINOv2 외형 임베딩으로 재등장 물체를 같은 노드에 복원
  app_weight: 0.6
  app_gate: 0.4        # cos 유사도가 이보다 낮으면 같은 물체로 보지 않음
  absence_limit: 12    # 시야 안·비가림인데 미검출이 이만큼 누적되면 노드 제거

graph:
  near_dist: 1.2       # 근접 엣지 거리 임계값
  vertical_ratio: 1.5  # 위/아래 판정: |dy| 가 수평거리의 몇 배 이상일 때

viz:
  memory_limit: 4GB
  point_subsample: 4   # depth→포인트클라우드 픽셀 서브샘플링
